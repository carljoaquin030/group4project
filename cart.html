<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart - Hook & Loop Creations</title>
  <link rel="stylesheet" href="./assets/css/shop.css" />
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script type="text/javascript">
    (function(){
      emailjs.init("yeshaconvento@gmail.com"); // Replace with your EmailJS public key
    })();
  </script>
</head>

<body>
  <!-- HEADER -->
  <header class="header">
    <nav class="navbar">
      <button class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about-us.html">About Us</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="cart-link" aria-label="Go to cart">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="icon-cart">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M2.25 2.25h2.25l1.5 9.75h13.5l1.5-6H8.25m0 0L7.5 6.75m0 0L6.75 2.25m0 4.5H19.5m-13.5 9.75a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3zm13.5 0a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Z" />
          </svg>
          <span>Cart</span>
          <span class="cart-badge" id="cartBadge">0</span>
        </a>
        <div class="search-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
            class="icon-search">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
        </div>
      </div>
      <div class="logo">
        <img class="logo-img" src="./assets/images/logo.png" alt="logo" width="20%" height="20%" />
      </div>
    </nav>
  </header>

  <main class="cart-landing">
    <section class="cart-header">
      <h1>Your Cart</h1>
      <p>Review the items you want to purchase before checkout.</p>
    </section>

    <section class="cart-content">
      <div class="cart-items" id="cartItems">
        <p class="empty-cart">Your cart is empty. Add items from the shop to see them here.</p>
      </div>

      <div class="cart-summary">
        <div class="cart-total">
          Total: Php <span id="cartTotal">0.00</span>
        </div>
        <div class="cart-actions">
          <button id="checkoutCart" class="cart-button">Checkout</button>
          <button id="clearCart" class="cart-button">Clear Cart</button>
          <a href="shop.html" class="cart-button">Continue Shopping</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Hook & Loop Creations. All rights reserved.</p>
  </footer>

  <script>
    const hamburger = document.getElementById("hamburger");
    const navLinks = document.getElementById("navLinks");
    const cartItemsContainer = document.getElementById("cartItems");
    const cartTotal = document.getElementById("cartTotal");
    const clearCartBtn = document.getElementById("clearCart");
    const checkoutBtn = document.getElementById("checkoutCart");

    hamburger.addEventListener("click", () => {
      navLinks.classList.toggle("active");
      hamburger.classList.toggle("active");
    });

    document.querySelectorAll(".nav-links a").forEach((link) => {
      link.addEventListener("click", () => {
        navLinks.classList.remove("active");
        hamburger.classList.remove("active");
      });
    });

    function formatPrice(value) {
      return value.toFixed(2);
    }

    function renderCart() {
      const cartItems = JSON.parse(localStorage.getItem("cartItems") || "[]");
      cartItemsContainer.innerHTML = "";

      if (cartItems.length === 0) {
        cartItemsContainer.innerHTML = '<p class="empty-cart">Your cart is empty. Add items from the shop to see them here.</p>';
        cartTotal.textContent = "0.00";
        checkoutBtn.disabled = true;
        return;
      }

      let total = 0;
      cartItems.forEach((item) => {
        total += item.price * item.quantity;
        const cartItem = document.createElement("div");
        cartItem.className = "cart-item";
        cartItem.innerHTML = `
          <img src="${item.image}" alt="${item.title}" />
          <div class="cart-item-info">
            <h3>${item.title}</h3>
            <div class="quantity-controls">
              <button class="qty-btn" data-id="${item.id}" data-action="decrease">-</button>
              <span class="quantity">${item.quantity}</span>
              <button class="qty-btn" data-id="${item.id}" data-action="increase">+</button>
            </div>
            <p>Php ${formatPrice(item.price)} each</p>
            <button class="remove-item" data-id="${item.id}">Remove</button>
          </div>
          <div class="cart-item-price">Php ${formatPrice(item.price * item.quantity)}</div>
        `;
        cartItemsContainer.appendChild(cartItem);
      });

      cartTotal.textContent = formatPrice(total);
      checkoutBtn.disabled = false;
    }

    cartItemsContainer.addEventListener("click", (event) => {
      const target = event.target;
      const id = target.dataset.id;
      if (!id) return;

      const cartItems = JSON.parse(localStorage.getItem("cartItems") || "[]");
      const itemIndex = cartItems.findIndex(item => item.id === id);

      if (target.matches(".remove-item")) {
        const nextCart = cartItems.filter((item) => item.id !== id);
        localStorage.setItem("cartItems", JSON.stringify(nextCart));
        renderCart();
        updateCartBadge();
      } else if (target.matches(".qty-btn")) {
        const action = target.dataset.action;
        if (action === "increase") {
          cartItems[itemIndex].quantity += 1;
        } else if (action === "decrease") {
          cartItems[itemIndex].quantity -= 1;
          if (cartItems[itemIndex].quantity <= 0) {
            cartItems.splice(itemIndex, 1);
          }
        }
        localStorage.setItem("cartItems", JSON.stringify(cartItems));
        renderCart();
        updateCartBadge();
      }
    });

    clearCartBtn.addEventListener("click", () => {
      localStorage.removeItem("cartItems");
      renderCart();
      updateCartBadge();
    });

    checkoutBtn.addEventListener("click", () => {
      const cartItems = JSON.parse(localStorage.getItem("cartItems") || "[]");
      if (cartItems.length === 0) {
        alert("Your cart is empty.");
        return;
      }
      const total = cartItems.reduce((sum, item) => sum + item.price * item.quantity, 0);
      const orderDetails = cartItems.map(item => `${item.title} (x${item.quantity}) - Php ${item.price * item.quantity}`).join('\n');
      const emailParams = {
        to_email: "yeshaconvento@gmail.com",
        subject: "New Order Placed",
        message: `A new order has been placed.\n\nOrder Details:\n${orderDetails}\n\nTotal: Php ${total.toFixed(2)}\n\nCustomer: [Customer Info if available]`
      };

      emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", emailParams)
        .then(function(response) {
          console.log('SUCCESS!', response.status, response.text);
          localStorage.setItem("checkoutData", JSON.stringify({ items: cartItems, total }));
          localStorage.removeItem("cartItems");
          updateCartBadge();
          window.location.href = "confirmation.html";
        }, function(error) {
          console.log('FAILED...', error);
          alert("There was an error sending the order email. Please try again.");
        });
    });

    function updateCartBadge() {
      const cartItems = JSON.parse(localStorage.getItem("cartItems") || "[]");
      const totalQuantity = cartItems.reduce((sum, item) => sum + item.quantity, 0);
      const badge = document.getElementById("cartBadge");
      badge.textContent = totalQuantity;
      badge.style.display = totalQuantity > 0 ? "inline-flex" : "none";
    }

    renderCart();
    updateCartBadge();
  </script>
</body>

</html>
